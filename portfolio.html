<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <title>Portfolio</title>
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #f3ecec, #d2c7c7);
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            transition: background 0.5s;
        }
        h1 {
            font-size: 2.5em;
            margin-bottom: 0.5em;
            animation: fadeIn 1s;
            text-align: center;
        }
        p {
            font-size: 1.2em;
            margin: 0.5em 0;
            animation: fadeIn 1.5s;
            text-align: center;
        }
        @keyframes fadeIn {
            from {opacity: 0;}
            to {opacity: 1;}
        }
        .container {
            max-width: 800px;
            padding: 2em;
            border-radius: 10px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            background: #fff;
            transition: transform 0.3s;
        }
        .container:hover {
            transform: scale(1.02);
        }
        @media(min-width: 600px) {
            h1 {
                font-size: 3em;
            }
            p {
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to My Portfolio</h1>
        <p>This is a showcase of my work and projects.</p>
    </div>
</body>
</html>
